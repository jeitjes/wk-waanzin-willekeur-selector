<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WK WAANZIN™ — I want to play a game</title>
<meta name="theme-color" content="#060a1e">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --navy: #0a1030;
    --navy-deep: #060a1e;
    --gold: #d4af37;
    --gold-bright: #ffd75e;
    --white: #f4f2ec;
    --red: #e03131;
    --teal: #1fd4c0;
    --magenta: #ff3df0;
    --green: #3ddc84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  html { -webkit-text-size-adjust: 100%; background: var(--navy-deep); }
  body {
    font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--navy-deep);
    color: var(--white);
    min-height: 100%;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  a, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  /* ---------- de permanente trip (zelfde als de homepage) ---------- */
  .trip {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    --spd: 30s;
    animation: hueSpin 22s linear infinite;
  }
  .ring { position: absolute; width: 130vmax; height: 130vmax; border-radius: 50%; opacity: 0.14; will-change: transform; }
  .r1 { background: repeating-conic-gradient(from 0deg, var(--gold-bright) 0 8deg, transparent 8deg 24deg); animation: spin var(--spd) linear infinite; }
  .r2 { background: repeating-radial-gradient(circle, rgba(255,61,240,0.7) 0 3vmax, transparent 3vmax 7vmax); animation: spinRev calc(var(--spd) * 0.7) linear infinite, breathe 7s ease-in-out infinite; }
  .r3 { background: conic-gradient(var(--teal), var(--magenta), var(--gold-bright), var(--teal)); filter: blur(32px); animation: spin calc(var(--spd) * 0.5) linear infinite; mix-blend-mode: screen; }
  .r4 { background: repeating-conic-gradient(from 10deg, rgba(31,212,192,0.8) 0 4deg, transparent 4deg 18deg); animation: spinRev calc(var(--spd) * 0.35) linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinRev { to { transform: rotate(-360deg); } }
  @keyframes breathe { 0%,100% { scale: 1; } 50% { scale: 1.25; } }
  @keyframes hueSpin { to { filter: hue-rotate(360deg); } }
  .waas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 110% 80% at 50% 40%, rgba(6,10,30,0.25) 0%, rgba(6,10,30,0.78) 100%);
  }

  .page {
    width: 100%;
    max-width: 520px;
    padding: 26px 20px calc(40px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .pop {
    width: 128px; height: 128px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 2px solid var(--red);
    background: radial-gradient(circle at 50% 38%, rgba(224,49,49,0.32), rgba(6,10,30,0.92) 72%);
    display: grid; place-items: center;
    box-shadow: 0 0 26px rgba(224,49,49,0.4);
    animation: popPulse 3.2s ease-in-out infinite;
  }
  .pop img { width: 76%; height: 76%; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.65)); }
  @keyframes popPulse {
    0%, 100% { box-shadow: 0 0 26px rgba(224,49,49,0.4); transform: scale(1); }
    50% { box-shadow: 0 0 40px rgba(224,49,49,0.7); transform: scale(1.03); }
  }

  h1 {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: clamp(30px, 9vw, 42px);
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--red);
    text-shadow: 0 0 18px rgba(224,49,49,0.5);
  }
  .subtitle {
    margin-top: 10px;
    font-size: 11.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(244,242,236,0.6);
  }
  .divider {
    width: 70%; margin: 22px 0; border: none; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .spellen { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .spel-kaart {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    padding: 16px 18px;
    border-radius: 10px;
    border: 1px solid rgba(212,175,55,0.35);
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    color: inherit;
    text-decoration: none;
    transition: transform 0.15s ease;
  }
  a.spel-kaart:active { transform: scale(0.98); }
  .spel-icoon { font-size: 30px; flex-shrink: 0; width: 42px; text-align: center; }
  .spel-mid { flex: 1; min-width: 0; }
  .spel-naam {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 20px; letter-spacing: 1.5px; text-transform: uppercase;
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 60%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .spel-omschrijving { margin-top: 3px; font-size: 12px; color: rgba(244,242,236,0.6); line-height: 1.4; }
  .spel-pijl { font-size: 18px; color: var(--gold); flex-shrink: 0; }

  .spel-kaart.op-slot { opacity: 0.55; cursor: default; }
  .spel-kaart.op-slot .spel-naam { -webkit-background-clip: text; background-clip: text; }
  .spel-badge {
    position: absolute; top: -9px; right: 14px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    background: var(--red); color: var(--white);
    padding: 3px 8px; border-radius: 10px;
  }

  .terug {
    margin-top: 28px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(212,175,55,0.7); text-decoration: none;
  }

  /* ---------- adminmodus: spellen onthullen/verbergen ---------- */
  .spel-toggle {
    position: absolute; top: -11px; left: 14px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: var(--navy-deep);
    border: none; border-radius: 10px;
    padding: 4px 9px;
    cursor: pointer;
  }
  .admin-badge {
    position: fixed;
    right: 10px;
    bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 30;
    display: none;
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--green);
    background: rgba(6,10,30,0.88);
    border: 1px solid rgba(212,175,55,0.6);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="trip" aria-hidden="true">
  <div class="ring r3"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r4"></div>
</div>
<div class="waas" aria-hidden="true"></div>

<div class="page">
  <div class="pop"><img src="/billy.svg" alt=""></div>
  <h1>I want to<br>play a game</h1>
  <div class="subtitle">Kies je spel</div>

  <hr class="divider">

  <div class="spellen" id="spellen"></div>

  <a class="terug" href="/">← terug naar het klassement</a>
</div>

<!-- adminbadge: alleen zichtbaar in adminmodus -->
<button class="admin-badge" id="admin-badge" title="Adminmodus — tik om uit te loggen">🔑 admin</button>

<script>
  const $ = id => document.getElementById(id);
  const SLEUTEL_OPSLAG = 'kwimAdminSleutel';

  // De spellen zelf staan hier; wélke onthuld zijn bepaalt de Federatie via het
  // spellen-veld in de leaderboard-state (aan/uit te zetten met de adminlink).
  const SPELLEN = [
    {
      id: 'volleybal', icoon: '🏐', naam: 'Volleybal', href: '/volleybal',
      omschrijving: 'Poule — iedereen tegen iedereen — daarna halve finales, een verliezersfinale en de finale. Het klassement en de volgende ronde volgen automatisch uit de ingevoerde scores.'
    },
    {
      id: 'wereldlied', icoon: '🎤', naam: 'Het Wereldlied', href: '/wereldlied',
      omschrijving: 'Overschrijf om de beurt het refrein van ANOTR — Talk To You met jullie eigen regels, en zing daarna samen het volkslied van de hele wereld.'
    },
    {
      id: 'infantino', icoon: '🤫', naam: 'Secret Infantino', href: '/infantino',
      omschrijving: 'Iemand van ons is in het geheim Gianni Infantino. De Federatie schudt en deelt de geheime rollen — de rest speel je live aan tafel.'
    }
  ];
  const STANDAARD_ONTHULD = { volleybal: true, wereldlied: true, infantino: false };

  let staat = null;
  let sleutel = '';
  let adminmodus = false;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function onthuld(id) {
    const spellen = (staat && staat.spellen) || {};
    return typeof spellen[id] === 'boolean' ? spellen[id] : !!STANDAARD_ONTHULD[id];
  }

  function render() {
    const wrap = $('spellen');
    wrap.innerHTML = '';
    SPELLEN.forEach(spel => {
      const open = onthuld(spel.id);
      const speelbaar = open && spel.href;
      const el = document.createElement(speelbaar ? 'a' : 'div');
      el.className = 'spel-kaart' + (open ? '' : ' op-slot');
      if (speelbaar) el.href = spel.href;
      el.innerHTML = `
        ${open ? '' : '<span class="spel-badge">binnenkort</span>'}
        <div class="spel-icoon">${open ? spel.icoon : '🔒'}</div>
        <div class="spel-mid">
          <div class="spel-naam">${escapeHtml(spel.naam)}</div>
          <div class="spel-omschrijving">${open ? escapeHtml(spel.omschrijving) : 'Nog niet vrijgegeven door de Federatie. Kom later terug.'}</div>
        </div>
        ${speelbaar ? '<div class="spel-pijl">→</div>' : ''}
        ${adminmodus ? `<button class="spel-toggle">${open ? '🙈 verberg' : '👁 onthul'}</button>` : ''}`;
      if (adminmodus) {
        el.querySelector('.spel-toggle').addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          wisselSpel(spel.id);
        });
      }
      wrap.appendChild(el);
    });
  }

  // vers van de server lezen, één spel omschakelen en terugschrijven — zo blijven
  // gelijktijdige teamwijzigingen vanaf de homepage behouden
  async function wisselSpel(id) {
    try {
      const res = await fetch('/api/state', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      const vers = await res.json();
      vers.spellen = Object.assign({}, STANDAARD_ONTHULD, vers.spellen);
      vers.spellen[id] = !vers.spellen[id];
      const put = await fetch('/api/state', {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + sleutel, 'Content-Type': 'application/json' },
        body: JSON.stringify(vers)
      });
      if (!put.ok) throw new Error(put.status);
      staat = vers;
      render();
    } catch {
      alert('Opslaan is niet gelukt — probeer het opnieuw.');
    }
  }

  async function laadStaat() {
    try {
      const res = await fetch('/api/state', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      const vers = await res.json();
      if (JSON.stringify(vers) !== JSON.stringify(staat)) {
        staat = vers;
        render();
      }
    } catch {}
  }

  $('admin-badge').addEventListener('click', () => {
    if (!confirm('Adminmodus verlaten? Je hebt de adminlink nodig om weer in te loggen.')) return;
    localStorage.removeItem(SLEUTEL_OPSLAG);
    location.reload();
  });

  (async () => {
    render(); // meteen iets tonen, ook zonder verbinding
    const urlSleutel = new URL(location.href).searchParams.get('k');
    const kandidaat = urlSleutel || localStorage.getItem(SLEUTEL_OPSLAG) || '';
    if (kandidaat) {
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Authorization': 'Bearer ' + kandidaat } });
        if (res.ok) {
          sleutel = kandidaat;
          adminmodus = true;
          localStorage.setItem(SLEUTEL_OPSLAG, sleutel);
        } else {
          localStorage.removeItem(SLEUTEL_OPSLAG);
        }
      } catch {}
      if (urlSleutel) history.replaceState(null, '', location.pathname);
    }
    if (adminmodus) $('admin-badge').style.display = 'block';
    await laadStaat();
    render();
    setInterval(laadStaat, 12000);
  })();
</script>

</body>
</html>
