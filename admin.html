<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WK WAANZIN™ — Federatie Controlekamer</title>
<meta name="theme-color" content="#060a1e">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --navy: #0a1030;
    --navy-deep: #060a1e;
    --gold: #d4af37;
    --gold-bright: #ffd75e;
    --white: #f4f2ec;
    --red: #e03131;
    --teal: #1fd4c0;
    --magenta: #ff3df0;
    --green: #3ddc84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--navy-deep); -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--navy-deep);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 120% 90% at 50% -20%, rgba(26,36,85,0.85) 0%, rgba(10,16,48,0.5) 45%, rgba(6,10,30,0) 75%);
    pointer-events: none;
    z-index: 0;
  }
  button, input, select {
    font-family: inherit;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button { user-select: none; -webkit-user-select: none; cursor: pointer; }

  .page {
    width: 100%;
    max-width: 560px;
    padding: 18px 18px 80px;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 30px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
  }
  h1 b {
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 60%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub {
    text-align: center;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(244,242,236,0.5);
    margin: 6px 0 18px;
  }

  /* ---------- login-poort ---------- */
  #poort { text-align: center; padding-top: 8vh; }
  .poort-panel {
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    padding: 26px 20px;
    max-width: 380px;
    margin: 0 auto;
  }
  .poort-panel p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.7); margin-bottom: 14px; }
  .sleutel-input {
    width: 100%;
    font-family: "Courier New", monospace;
    font-size: 16px;
    color: var(--gold-bright);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
    padding: 13px 12px;
    outline: none;
    text-align: center;
  }
  .sleutel-input:focus { border-color: var(--gold-bright); box-shadow: 0 0 12px rgba(212,175,55,0.3); }
  .btn-gold {
    margin-top: 14px;
    width: 100%;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 19px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--navy-deep);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border: none;
    border-radius: 4px;
    padding: 14px;
  }
  .poort-fout {
    margin-top: 12px;
    font-family: "Courier New", monospace;
    font-size: 12px;
    color: var(--red);
    min-height: 16px;
  }

  /* ---------- statusbalk ---------- */
  .statusbalk {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(180deg, #101838, #0a1030);
    border-top: 2px solid var(--gold);
    padding: 9px 14px calc(9px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Courier New", monospace;
    font-size: 12px;
    color: rgba(244,242,236,0.75);
  }
  .statusbalk .ok { color: var(--green); }
  .statusbalk .bezig { color: var(--gold-bright); }
  .statusbalk .fout { color: var(--red); }
  .uitlog { background: none; border: 1px solid rgba(212,175,55,0.4); border-radius: 4px; color: rgba(244,242,236,0.6); font-size: 11px; letter-spacing: 1px; padding: 4px 10px; text-transform: uppercase; }

  /* ---------- teamkaarten ---------- */
  #teams { display: none; flex-direction: column; gap: 14px; }
  .kaart {
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    padding: 14px;
  }
  .kaart-kop { display: flex; align-items: center; gap: 10px; }
  .plek {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 26px;
    width: 30px;
    text-align: center;
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 60%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    flex-shrink: 0;
  }
  .logo-dop {
    width: 46px; height: 46px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(212,175,55,0.5);
    background: #0d1436;
    overflow: hidden;
    display: grid; place-items: center;
    font-size: 20px;
  }
  .logo-dop img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .logo-wrap { position: relative; flex-shrink: 0; }
  .vlag-badge {
    position: absolute; right: -3px; bottom: -3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy-deep);
    border: 1px solid rgba(212,175,55,0.6);
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .kop-mid { flex: 1; min-width: 0; }
  .naam-input {
    width: 100%;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--white);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 2px 6px;
    outline: none;
  }
  .naam-input:focus { border-color: rgba(212,175,55,0.5); background: rgba(6,10,30,0.6); }
  .spelers { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.5); padding-left: 7px; }

  .pijlen { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .pijl {
    width: 34px; height: 26px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    color: var(--gold-bright);
    font-size: 13px;
    line-height: 1;
  }
  .pijl:disabled { opacity: 0.25; }
  .pijl:active:not(:disabled) { transform: scale(0.94); }

  .regel {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(212,175,55,0.18);
  }
  .regel-label { font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(244,242,236,0.45); margin-bottom: 8px; }

  .punten-rij { display: flex; align-items: center; gap: 10px; }
  .punt-knop {
    width: 42px; height: 38px;
    font-size: 19px; font-weight: 700;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    color: var(--gold-bright);
  }
  .punt-knop:active { transform: scale(0.94); }
  .punten-input {
    width: 72px;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 24px;
    text-align: center;
    color: var(--gold-bright);
    background: rgba(6,10,30,0.7);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
    padding: 4px;
    outline: none;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 6px 9px;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 20px;
    background: rgba(6,10,30,0.55);
    color: rgba(244,242,236,0.7);
  }
  .chip.aan {
    border-color: var(--gold-bright);
    background: linear-gradient(180deg, rgba(212,175,55,0.3), rgba(212,175,55,0.12));
    color: var(--gold-bright);
    box-shadow: 0 0 10px rgba(212,175,55,0.3);
  }
  .chip img { width: 15px; height: 15px; object-fit: contain; vertical-align: -3px; }
  .def-img { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
  .badge-kaart { border-color: rgba(31,212,192,0.45); }
  .badge-kaart .kaart-titel {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 17px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 2px;
  }
  .badge-kaart .kaart-uitleg { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.45); margin-bottom: 10px; }

  .trofee-lijst { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .trofee-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 5px;
    padding: 6px 8px;
    background: rgba(6,10,30,0.5);
  }
  .trofee-item .t-naam { flex: 1; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; font-size: 11.5px; }
  .t-weg { background: none; border: 1px solid rgba(224,49,49,0.5); border-radius: 4px; color: var(--red); font-size: 11px; padding: 3px 8px; }
  .toevoeg-rij { display: flex; gap: 6px; }
  .toevoeg-rij select, .toevoeg-rij input[type="text"] {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--white);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    padding: 8px;
    outline: none;
  }
  .t-plus {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border: none; border-radius: 4px;
    color: var(--navy-deep);
    font-weight: 700; font-size: 13px;
    padding: 0 14px;
    letter-spacing: 1px;
  }
  .land-rij { display: flex; align-items: center; gap: 10px; }
  .vlag-groot { font-size: 26px; line-height: 1; width: 32px; text-align: center; flex-shrink: 0; }
  .land-select {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--white);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    padding: 8px;
    outline: none;
  }

  .logo-rij { display: flex; align-items: center; gap: 10px; }
  .logo-rij .logo-dop { width: 54px; height: 54px; }
  .upload-knop {
    display: inline-block;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold-bright);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
    padding: 9px 14px;
    cursor: pointer;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  }
  .upload-knop input { display: none; }
  .logo-weg { background: none; border: 1px solid rgba(224,49,49,0.5); border-radius: 4px; color: var(--red); font-size: 11px; letter-spacing: 1px; padding: 9px 12px; text-transform: uppercase; }

  /* ---------- wereldlied-beheer ---------- */
  .wereldlied-kaart { border-color: rgba(255,61,240,0.4); }
  .wereldlied-kaart .kaart-titel {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 17px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--magenta); margin-bottom: 2px;
  }
  .wereldlied-kaart .kaart-uitleg { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.45); margin-bottom: 10px; }
  .wereldlied-kaart .kaart-uitleg a { color: var(--teal); }
  .wl-status { font-size: 13px; letter-spacing: 1px; padding: 8px 0 4px; }
  .wl-instel-rij { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; letter-spacing: 1px; color: rgba(244,242,236,0.7); }
  .wl-instel-rij input[type="number"] { width: 60px; background: rgba(6,10,30,0.8); border: 1px solid rgba(212,175,55,0.4); border-radius: 4px; color: var(--white); padding: 5px; text-align: center; }
  .wl-knoppen { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .wl-regels { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; max-height: 220px; overflow-y: auto; }
  .wl-regel-item { font-size: 12px; border: 1px solid rgba(212,175,55,0.2); border-radius: 5px; background: rgba(6,10,30,0.4); padding: 6px 9px; text-align: left; }
  .wl-geschiedenis { margin-top: 14px; }
  .wl-geschiedenis summary { font-size: 12px; letter-spacing: 1px; color: rgba(244,242,236,0.7); cursor: pointer; }
  .wl-geschiedenis-lijst { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; max-height: 320px; overflow-y: auto; }
  .wl-ronde { border: 1px solid rgba(212,175,55,0.25); border-radius: 6px; background: rgba(6,10,30,0.4); padding: 8px 10px; text-align: left; }
  .wl-ronde-datum { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.45); margin-bottom: 6px; }
  .wl-ronde-tekst { font-size: 12px; line-height: 1.5; }
</style>
</head>
<body>

<div class="page">
  <h1>Federatie <b>Controlekamer</b></h1>
  <div class="sub">Alleen voor organisatoren · Kwim-protocol v4.5.12</div>

  <!-- login -->
  <div id="poort">
    <div class="poort-panel">
      <p>🔒 Voer de Federatie-sleutel in</p>
      <input class="sleutel-input" id="sleutel" type="password" autocomplete="off" placeholder="KWIM-XXXX-XXXX-…">
      <button class="btn-gold" id="poort-btn">Ontgrendel</button>
      <div class="poort-fout" id="poort-fout"></div>
    </div>
  </div>

  <!-- wereldlied-beheer (ververst apart, zodat het bewerken van teams niet steeds onderbroken wordt) -->
  <div id="wereldlied-houder" style="display:none"></div>

  <!-- teamkaarten -->
  <div id="teams"></div>
</div>

<div class="statusbalk" id="statusbalk" style="display:none">
  <span id="opslag-status">—</span>
  <button class="uitlog" id="uitlog">Vergrendel</button>
</div>

<script src="/catalog.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const CAT = window.KWIM_CATALOGUS;
  const SLEUTEL_OPSLAG = 'kwimAdminSleutel';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  let sleutel = localStorage.getItem(SLEUTEL_OPSLAG) || '';
  let staat = null;
  let opslaanTimer = null;
  let wereldliedStaat = null;
  let wereldliedGeschiedenis = null;

  /* ================= login ================= */
  async function probeerLogin(kandidaat) {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + kandidaat }
    });
    return res;
  }

  $('poort-btn').addEventListener('click', async () => {
    const kandidaat = $('sleutel').value.trim();
    if (!kandidaat) return;
    $('poort-fout').textContent = '';
    const res = await probeerLogin(kandidaat);
    if (res.ok) {
      sleutel = kandidaat;
      localStorage.setItem(SLEUTEL_OPSLAG, sleutel);
      start();
    } else if (res.status === 429) {
      $('poort-fout').textContent = '✗ Te veel mislukte pogingen. Probeer het over 15 minuten opnieuw.';
    } else {
      $('poort-fout').textContent = '✗ Sleutel afgewezen door de Federatie.';
    }
  });
  $('sleutel').addEventListener('keydown', e => { if (e.key === 'Enter') $('poort-btn').click(); });

  $('uitlog').addEventListener('click', () => {
    localStorage.removeItem(SLEUTEL_OPSLAG);
    location.reload();
  });

  /* ================= opslaan ================= */
  function zetStatus(tekst, klasse) {
    $('opslag-status').innerHTML = `<span class="${klasse}">${tekst}</span>`;
  }

  function planOpslaan() {
    zetStatus('● wijzigingen…', 'bezig');
    clearTimeout(opslaanTimer);
    opslaanTimer = setTimeout(slaOp, 800);
  }

  async function slaOp() {
    zetStatus('● opslaan…', 'bezig');
    try {
      const res = await fetch('/api/state', {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + sleutel,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(staat)
      });
      if (!res.ok) throw new Error(res.status);
      const nu = new Date().toTimeString().slice(0, 8);
      zetStatus('✓ opgeslagen ' + nu, 'ok');
    } catch (e) {
      zetStatus('✗ opslaan mislukt — probeer opnieuw', 'fout');
    }
  }

  /* ================= renderen ================= */
  let badgeUploadData = null; // verkleinde afbeelding die klaarstaat om toegevoegd te worden

  function renderPrijzenBeheer(wrap) {
    const kaart = document.createElement('div');
    kaart.className = 'kaart badge-kaart';
    const defs = (staat.prijsDefs || []).map((b, bi) => `
      <div class="trofee-item">
        <img class="def-img" src="${b.afbeelding}" alt="">
        <span class="t-naam">${escapeHtml(b.naam)}</span>
        <button class="t-weg def-weg" data-def="${bi}">✕</button>
      </div>`).join('');
    kaart.innerHTML = `
      <div class="kaart-titel">🎖️ Prijzenbeheer</div>
      <div class="kaart-uitleg">Upload jullie eigen prijs-afbeeldingen — daarna per team toe te kennen</div>
      <div class="trofee-lijst">${defs}</div>
      <div class="toevoeg-rij">
        <label class="upload-knop"><span class="badge-kies-tekst">🖼️ Kies…</span><input type="file" accept="image/*" class="badge-file"></label>
        <input type="text" class="badge-naam" placeholder="Naam van de prijs…" maxlength="30">
        <button class="t-plus badge-plus">+</button>
      </div>`;

    kaart.querySelector('.badge-file').addEventListener('change', async e => {
      const bestand = e.target.files[0];
      if (!bestand) return;
      try {
        badgeUploadData = await verkleinBadge(bestand);
        kaart.querySelector('.badge-kies-tekst').innerHTML = `<img class="chip-preview" src="${badgeUploadData}" style="width:16px;height:16px;object-fit:contain;vertical-align:-3px"> gekozen`;
      } catch {
        zetStatus('✗ afbeelding kon niet worden gelezen', 'fout');
      }
    });
    kaart.querySelector('.badge-plus').addEventListener('click', () => {
      const naam = kaart.querySelector('.badge-naam').value.trim();
      if (!badgeUploadData) { zetStatus('✗ kies eerst een afbeelding', 'fout'); return; }
      if (!naam) { zetStatus('✗ geef de prijs een naam', 'fout'); return; }
      staat.prijsDefs = staat.prijsDefs || [];
      staat.prijsDefs.push({ id: 'bdef-' + Date.now(), naam, afbeelding: badgeUploadData });
      badgeUploadData = null;
      render();
      planOpslaan();
    });
    kaart.querySelectorAll('.def-weg').forEach(btn => {
      btn.addEventListener('click', () => {
        const def = staat.prijsDefs[Number(btn.dataset.def)];
        staat.prijsDefs.splice(Number(btn.dataset.def), 1);
        // haal de prijs ook weg bij teams die hem verdiend hadden
        staat.teams.forEach(t => { t.prijzen = (t.prijzen || []).filter(id => id !== def.id); });
        render();
        planOpslaan();
      });
    });
    wrap.appendChild(kaart);
  }

  /* ================= wereldlied-beheer ================= */
  async function laadWereldlied() {
    try {
      const res = await fetch('/api/wereldlied', { cache: 'no-store' });
      wereldliedStaat = await res.json();
    } catch {}
  }

  async function laadWereldliedGeschiedenis() {
    try {
      const res = await fetch('/api/wereldlied/geschiedenis', { cache: 'no-store' });
      wereldliedGeschiedenis = await res.json();
    } catch {}
  }

  function renderWereldliedBeheer() {
    const houder = $('wereldlied-houder');
    houder.style.display = 'block';
    houder.innerHTML = '';
    const kaart = document.createElement('div');
    kaart.className = 'kaart wereldlied-kaart';
    const w = wereldliedStaat;
    const naamVan = id => (staat.teams.find(t => t.id === id) || {}).naam || id;

    let statusHtml;
    if (!w || !w.actief) statusHtml = '○ nog niet gestart';
    else if (w.klaar) statusHtml = `✓ compleet — ${w.regels.length} regel${w.regels.length === 1 ? '' : 's'}`;
    else statusHtml = `● aan de beurt: <b>${escapeHtml(naamVan(w.volgorde[w.huidige]))}</b> (${w.huidige + 1}/${w.volgorde.length})`;

    const regelsHtml = w && w.regels.length
      ? w.regels.map(r => `<div class="wl-regel-item">${r.overgeslagen
          ? '⏭ <i>' + escapeHtml(naamVan(r.teamId)) + ' — tijd verstreken</i>'
          : '<b>' + escapeHtml(naamVan(r.teamId)) + ':</b> ' + escapeHtml(r.tekst)}</div>`).join('')
      : '';

    const bezig = !!(w && w.actief && !w.klaar);

    kaart.innerHTML = `
      <div class="kaart-titel">🌍 Wereldlied</div>
      <div class="kaart-uitleg">Elk team kiest zichzelf, zonder code — pagina: <a href="/wereldlied" target="_blank">/wereldlied</a></div>
      <div class="wl-status">${statusHtml}</div>
      <div class="regel">
        <div class="regel-label">Instellingen voor een nieuwe ronde</div>
        <div class="wl-instel-rij">
          <label>⏱ <input type="number" class="wl-duur" min="5" max="300" value="${(w && w.duur) || 20}"> sec per beurt</label>
          <label><input type="checkbox" class="wl-shuffle"> shuffel volgorde</label>
        </div>
      </div>
      <div class="wl-knoppen">
        <button class="t-plus wl-start">▶ ${bezig ? 'Stop &amp; herstart' : 'Start'}</button>
        ${bezig ? `<button class="logo-weg wl-stop">⛔ Stop</button>` : ''}
      </div>
      ${regelsHtml ? `<div class="wl-regels">${regelsHtml}</div>` : ''}
      <details class="wl-geschiedenis">
        <summary>📜 Eerdere wereldliederen (${(wereldliedGeschiedenis || []).length})</summary>
        <div class="wl-geschiedenis-lijst">${renderWereldliedGeschiedenis()}</div>
      </details>`;

    kaart.querySelector('.wl-start').addEventListener('click', async () => {
      const duur = parseInt(kaart.querySelector('.wl-duur').value, 10) || 20;
      const shuffle = kaart.querySelector('.wl-shuffle').checked;
      if (bezig && !confirm('Er loopt al een ronde — deze stoppen en een nieuwe starten?')) return;
      try {
        if (bezig) await fetch('/api/wereldlied/reset', { method: 'POST' });
        const res = await fetch('/api/wereldlied/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ duur, shuffle })
        });
        if (res.ok) {
          const data = await res.json();
          wereldliedStaat = data.staat;
          await laadWereldliedGeschiedenis();
          renderWereldliedBeheer();
        }
      } catch {}
    });

    const stopBtn = kaart.querySelector('.wl-stop');
    if (stopBtn) stopBtn.addEventListener('click', async () => {
      if (!confirm('Wereldlied stoppen voor alle teams? De ronde tot nu toe wordt bewaard in de geschiedenis.')) return;
      try {
        await fetch('/api/wereldlied/reset', { method: 'POST' });
      } catch {}
      await laadWereldlied();
      await laadWereldliedGeschiedenis();
      renderWereldliedBeheer();
    });

    houder.appendChild(kaart);
  }

  function renderWereldliedGeschiedenis() {
    const rondes = wereldliedGeschiedenis || [];
    if (!rondes.length) return '<i>nog geen eerdere rondes</i>';
    return rondes.map(r => {
      const datum = new Date(r.geeindigd).toLocaleString('nl-NL', { dateStyle: 'medium', timeStyle: 'short' });
      const tekst = r.regels
        .filter(x => !x.overgeslagen)
        .map(x => escapeHtml(x.tekst))
        .join(' ') || '<i>alleen overgeslagen beurten</i>';
      return `<div class="wl-ronde">
        <div class="wl-ronde-datum">${escapeHtml(datum)}${r.klaar ? '' : ' — afgebroken'}</div>
        <div class="wl-ronde-tekst">${tekst}</div>
      </div>`;
    }).join('');
  }

  function render() {
    const wrap = $('teams');
    wrap.innerHTML = '';
    renderPrijzenBeheer(wrap);
    staat.teams.forEach((team, i) => {
      const kaart = document.createElement('div');
      kaart.className = 'kaart';

      const eigenChips = (staat.prijsDefs || []).map(b => {
        const aan = (team.prijzen || []).includes(b.id);
        return `<button class="chip ${aan ? 'aan' : ''}" data-prijs="${b.id}"><img src="${b.afbeelding}" alt=""> ${escapeHtml(b.naam)}</button>`;
      });
      const prijsChips = eigenChips.concat(CAT.prijzen.map(b => {
        const aan = (team.prijzen || []).includes(b.id);
        return `<button class="chip ${aan ? 'aan' : ''}" data-prijs="${b.id}"><img src="${b.afbeelding}" alt=""> ${escapeHtml(b.naam)}</button>`;
      })).join('');

      const landOpties = CAT.landen
        .map(l => `<option value="${l.code}" ${team.land === l.code ? 'selected' : ''}>${window.KWIM_VLAG(l.code)} ${escapeHtml(l.naam)}</option>`)
        .join('');

      kaart.innerHTML = `
        <div class="kaart-kop">
          <div class="plek">${i + 1}</div>
          <div class="pijlen">
            <button class="pijl omhoog" ${i === 0 ? 'disabled' : ''}>▲</button>
            <button class="pijl omlaag" ${i === staat.teams.length - 1 ? 'disabled' : ''}>▼</button>
          </div>
          <div class="logo-wrap">
            <div class="logo-dop">${team.logo ? `<img src="${team.logo}" alt="">` : '👁️'}</div>
            ${team.land ? `<span class="vlag-badge">${window.KWIM_VLAG(team.land)}</span>` : ''}
          </div>
          <div class="kop-mid">
            <input class="naam-input" value="${escapeHtml(team.naam)}" maxlength="30">
            <div class="spelers">${team.spelers.map(escapeHtml).join(' & ')}</div>
          </div>
        </div>

        <div class="regel">
          <div class="regel-label">Land</div>
          <div class="land-rij">
            <span class="vlag-groot">${team.land ? window.KWIM_VLAG(team.land) : '🏳️'}</span>
            <select class="land-select">
              <option value="">— geen vlag —</option>
              ${landOpties}
            </select>
          </div>
        </div>

        <div class="regel">
          <div class="regel-label">Punten</div>
          <div class="punten-rij">
            <button class="punt-knop min">−</button>
            <input class="punten-input" type="number" value="${team.punten}">
            <button class="punt-knop plus">+</button>
          </div>
        </div>

        <div class="regel">
          <div class="regel-label">Prijzenkast</div>
          <div class="chips">${prijsChips}</div>
        </div>

        <div class="regel">
          <div class="regel-label">Logo</div>
          <div class="logo-rij">
            <div class="logo-dop">${team.logo ? `<img src="${team.logo}" alt="">` : '👁️'}</div>
            <label class="upload-knop">📷 Upload logo<input type="file" accept="image/*"></label>
            ${team.logo ? '<button class="logo-weg">✕ Weg</button>' : ''}
          </div>
        </div>`;

      /* ---- gedrag ---- */
      kaart.querySelector('.omhoog').addEventListener('click', () => verplaats(i, -1));
      kaart.querySelector('.omlaag').addEventListener('click', () => verplaats(i, 1));

      const naamInput = kaart.querySelector('.naam-input');
      naamInput.addEventListener('input', () => {
        team.naam = naamInput.value.trim() || 'Team ' + (i + 1);
        planOpslaan();
      });

      kaart.querySelector('.land-select').addEventListener('change', e => {
        team.land = e.target.value || null;
        render();
        planOpslaan();
      });

      const puntenInput = kaart.querySelector('.punten-input');
      puntenInput.addEventListener('input', () => {
        team.punten = parseInt(puntenInput.value, 10) || 0;
        planOpslaan();
      });
      kaart.querySelector('.min').addEventListener('click', () => {
        team.punten = (team.punten || 0) - 1;
        puntenInput.value = team.punten;
        planOpslaan();
      });
      kaart.querySelector('.plus').addEventListener('click', () => {
        team.punten = (team.punten || 0) + 1;
        puntenInput.value = team.punten;
        planOpslaan();
      });

      kaart.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const id = chip.dataset.prijs;
          team.prijzen = team.prijzen || [];
          const idx = team.prijzen.indexOf(id);
          if (idx >= 0) team.prijzen.splice(idx, 1); else team.prijzen.push(id);
          chip.classList.toggle('aan');
          planOpslaan();
        });
      });

      kaart.querySelector('input[type="file"]').addEventListener('change', async e => {
        const bestand = e.target.files[0];
        if (!bestand) return;
        try {
          team.logo = await verkleinLogo(bestand);
          render();
          planOpslaan();
        } catch {
          zetStatus('✗ logo kon niet worden gelezen', 'fout');
        }
      });
      const wegKnop = kaart.querySelector('.logo-weg');
      if (wegKnop) wegKnop.addEventListener('click', () => {
        team.logo = null;
        render();
        planOpslaan();
      });

      wrap.appendChild(kaart);
    });
  }

  function verplaats(i, richting) {
    const j = i + richting;
    if (j < 0 || j >= staat.teams.length) return;
    [staat.teams[i], staat.teams[j]] = [staat.teams[j], staat.teams[i]];
    render();
    planOpslaan();
  }

  /* ================= logo verkleinen (canvas, 256px vierkant) ================= */
  function verkleinLogo(bestand) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(bestand);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const MAAT = 256;
        const canvas = document.createElement('canvas');
        canvas.width = MAAT; canvas.height = MAAT;
        const ctx = canvas.getContext('2d');
        // cover-crop naar vierkant
        const kant = Math.min(img.width, img.height);
        const sx = (img.width - kant) / 2;
        const sy = (img.height - kant) / 2;
        ctx.drawImage(img, sx, sy, kant, kant, 0, 0, MAAT, MAAT);
        let data = canvas.toDataURL('image/webp', 0.85);
        if (!data.startsWith('data:image/webp')) data = canvas.toDataURL('image/jpeg', 0.85);
        resolve(data);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('ongeldig beeld')); };
      img.src = url;
    });
  }

  /* ================= badge verkleinen (canvas, 128px, transparantie blijft) ================= */
  function verkleinBadge(bestand) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(bestand);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const MAAT = 128;
        const canvas = document.createElement('canvas');
        canvas.width = MAAT; canvas.height = MAAT;
        const ctx = canvas.getContext('2d');
        // contain — geen crop, badge past in zijn geheel
        const schaal = Math.min(MAAT / img.width, MAAT / img.height);
        const w = img.width * schaal, h = img.height * schaal;
        ctx.drawImage(img, (MAAT - w) / 2, (MAAT - h) / 2, w, h);
        let data = canvas.toDataURL('image/webp', 0.9);
        if (!data.startsWith('data:image/webp')) data = canvas.toDataURL('image/png');
        resolve(data);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('ongeldig beeld')); };
      img.src = url;
    });
  }

  /* ================= start ================= */
  async function start() {
    $('poort').style.display = 'none';
    $('statusbalk').style.display = 'flex';
    const res = await fetch('/api/state', { cache: 'no-store' });
    staat = await res.json();
    staat.prijsDefs = staat.prijsDefs || [];
    await laadWereldlied();
    await laadWereldliedGeschiedenis();
    $('teams').style.display = 'flex';
    render();
    renderWereldliedBeheer();
    zetStatus('✓ verbonden met de Federatie', 'ok');
    setInterval(async () => { await laadWereldlied(); renderWereldliedBeheer(); }, 5000);
  }

  (async () => {
    if (sleutel && await probeerLogin(sleutel)) {
      start();
    } else {
      localStorage.removeItem(SLEUTEL_OPSLAG);
      setTimeout(() => $('sleutel').focus(), 300);
    }
  })();
</script>
</body>
</html>
