<!DOCTYPE html>
<html lang="nl"><!-- cache-bust -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WK WAANZIN™ — Het Wereldlied</title>
<meta name="theme-color" content="#060a1e">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --navy: #0a1030;
    --navy-deep: #060a1e;
    --gold: #d4af37;
    --gold-bright: #ffd75e;
    --white: #f4f2ec;
    --red: #e03131;
    --teal: #1fd4c0;
    --magenta: #ff3df0;
    --green: #3ddc84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  html { -webkit-text-size-adjust: 100%; background: var(--navy-deep); }
  body {
    font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--navy-deep);
    color: var(--white);
    min-height: 100%;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  button, input, textarea, select { font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  button { user-select: none; -webkit-user-select: none; cursor: pointer; }

  /* ---------- de permanente trip (zelfde als de homepage) ---------- */
  .trip {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    --spd: 30s;
    animation: hueSpin 22s linear infinite;
  }
  .ring { position: absolute; width: 130vmax; height: 130vmax; border-radius: 50%; opacity: 0.14; will-change: transform; }
  .r1 { background: repeating-conic-gradient(from 0deg, var(--gold-bright) 0 8deg, transparent 8deg 24deg); animation: spin var(--spd) linear infinite; }
  .r2 { background: repeating-radial-gradient(circle, rgba(255,61,240,0.7) 0 3vmax, transparent 3vmax 7vmax); animation: spinRev calc(var(--spd) * 0.7) linear infinite, breathe 7s ease-in-out infinite; }
  .r3 { background: conic-gradient(var(--teal), var(--magenta), var(--gold-bright), var(--teal)); filter: blur(32px); animation: spin calc(var(--spd) * 0.5) linear infinite; mix-blend-mode: screen; }
  .r4 { background: repeating-conic-gradient(from 10deg, rgba(31,212,192,0.8) 0 4deg, transparent 4deg 18deg); animation: spinRev calc(var(--spd) * 0.35) linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinRev { to { transform: rotate(-360deg); } }
  @keyframes breathe { 0%,100% { scale: 1; } 50% { scale: 1.25; } }
  @keyframes hueSpin { to { filter: hue-rotate(360deg); } }
  .waas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 110% 80% at 50% 40%, rgba(6,10,30,0.25) 0%, rgba(6,10,30,0.78) 100%);
  }

  .page {
    width: 100%;
    max-width: 560px;
    padding: 22px 18px calc(30px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: clamp(34px, 10vw, 48px);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 55%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle {
    margin-top: 8px;
    font-size: 11.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(244,242,236,0.7);
  }
  .subtitle b {
    background: linear-gradient(90deg, var(--teal), var(--magenta), var(--gold-bright));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 700;
    animation: hueSpin 8s linear infinite;
  }
  .divider {
    width: 70%; margin: 18px 0; border: none; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ---------- wachtscherm ---------- */
  .wacht { padding: 14vh 10px 0; }
  .wacht .stip {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--red); margin-right: 8px; vertical-align: 1px;
    animation: blink 1.2s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0.15; } }
  .wacht-tekst { font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.75); line-height: 1.9; }

  /* ---------- inlogpoort ---------- */
  .poort-panel {
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    padding: 26px 20px;
    width: 100%;
    max-width: 380px;
    margin: 10vh auto 0;
  }
  .poort-panel p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.7); margin-bottom: 14px; }
  .poort-panel select, .poort-panel input {
    width: 100%;
    font-size: 16px;
    color: var(--gold-bright);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
    padding: 13px 12px;
    outline: none;
    text-align: center;
    margin-bottom: 10px;
  }
  .poort-panel select:focus, .poort-panel input:focus { border-color: var(--gold-bright); box-shadow: 0 0 12px rgba(212,175,55,0.3); }
  .btn-gold {
    margin-top: 4px; width: 100%;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 19px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--navy-deep);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border: none; border-radius: 4px; padding: 14px;
  }
  .btn-gold:active { transform: scale(0.98); }

  /* ---------- beurt-kop ---------- */
  .beurt-kop { width: 100%; margin-bottom: 20px; }
  .beurt-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(244,242,236,0.55); margin-bottom: 8px; }
  .beurt-team {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 28px; letter-spacing: 1.5px; text-transform: uppercase;
    background: linear-gradient(90deg, var(--teal), var(--magenta), var(--gold-bright));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: hueSpin 6s linear infinite;
  }

  .ring-wrap { position: relative; width: 96px; height: 96px; margin: 6px auto 16px; }
  .ring-timer { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(212,175,55,0.2); stroke-width: 8; }
  .ring-fg {
    fill: none; stroke: url(#ringGrad); stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear;
  }
  .ring-getal {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 30px; color: var(--gold-bright);
  }
  .ring-wrap.dringend .ring-getal { color: var(--red); animation: pulse 0.6s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.12); } }

  .invoer-blok { width: 100%; }
  .invoer-tekst {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    color: var(--white);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 6px;
    padding: 12px;
    outline: none;
    resize: none;
    min-height: 74px;
  }
  .invoer-tekst:focus { border-color: var(--gold-bright); box-shadow: 0 0 12px rgba(212,175,55,0.25); }
  .invoer-teller { font-size: 10px; letter-spacing: 1px; color: rgba(244,242,236,0.4); text-align: right; margin: 4px 2px 12px; }

  .wacht-op {
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(244,242,236,0.55); margin-top: 4px;
  }

  /* ---------- de ketting ---------- */
  .ketting { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .regel-kaart {
    position: relative;
    text-align: left;
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    padding: 11px 14px;
    animation: regelIn 0.5s cubic-bezier(0.2, 1, 0.4, 1) backwards;
  }
  @keyframes regelIn { from { opacity: 0; transform: translateY(14px) scale(0.97); } }
  .regel-kaart.nieuw { box-shadow: 0 0 0 2px var(--gold-bright), 0 0 20px rgba(212,175,55,0.4); }
  .regel-team {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-bright); margin-bottom: 3px;
  }
  .regel-tekst { font-size: 15px; line-height: 1.4; }
  .regel-tekst.overgeslagen { color: rgba(244,242,236,0.4); font-style: italic; }
  .regel-tekst.nu-bezig { color: var(--gold-bright); font-style: italic; }
  .regel-origineel { font-size: 12px; color: rgba(244,242,236,0.45); font-style: italic; margin-bottom: 3px; }
  .regel-origineel.doorgestreept { text-decoration: line-through; }
  .regel-kaart.nu { border-color: var(--gold-bright); box-shadow: 0 0 16px rgba(212,175,55,0.35); }
  .regel-kaart.straks { opacity: 0.55; }

  /* ---------- overschrijf-prompt boven het invoerveld ---------- */
  .overschrijf-prompt {
    border: 1px dashed rgba(212,175,55,0.5);
    border-radius: 8px;
    background: rgba(212,175,55,0.07);
    padding: 10px 14px;
    margin-bottom: 10px;
  }
  .overschrijf-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.55); margin-bottom: 4px; }
  .overschrijf-origineel {
    font-size: 17px; font-style: italic;
    background: linear-gradient(90deg, var(--teal), var(--magenta), var(--gold-bright));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .zing-hint { margin-top: 10px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.5); }

  /* ---------- eerdere versies ---------- */
  .versie-lijst { width: 100%; margin-top: 30px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
  .versie-kop { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(244,242,236,0.55); text-align: center; margin-bottom: 4px; }
  .versie-knop {
    display: flex; flex-direction: column; gap: 3px;
    text-align: left;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    padding: 10px 14px;
    color: var(--white);
    font-size: 14px;
    width: 100%;
  }
  .versie-knop:active { transform: scale(0.98); }
  .versie-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-bright); }
  .versie-preview { font-style: italic; color: rgba(244,242,236,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .versie-datum { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.55); margin-bottom: 12px; }

  /* ---------- klaar ---------- */
  .klaar-banner {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 26px; letter-spacing: 1.5px; text-transform: uppercase;
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 60%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 14px;
  }
  .voorlezen {
    text-align: left;
    border: 2px solid var(--gold);
    border-radius: 10px;
    background: radial-gradient(ellipse 120% 70% at 50% 0%, rgba(212,175,55,0.12), transparent 55%), linear-gradient(180deg, #121a3e, var(--navy-deep));
    padding: 18px 18px 20px;
    margin-top: 18px;
    font-size: 16px;
    line-height: 1.7;
    box-shadow: 0 0 40px rgba(212,175,55,0.2);
  }
  .voorlezen b { color: var(--gold-bright); }

  .uitloggen { margin-top: 22px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(244,242,236,0.35); background: none; border: none; text-decoration: underline; }

  /* ---------- teamwissel bovenin ---------- */
  .team-balk {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 16px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(244,242,236,0.55);
  }
  .team-balk select {
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    color: var(--gold-bright);
    padding: 7px 10px;
    font-size: 13px;
    text-align: center;
    outline: none;
  }
  .team-balk select:focus { border-color: var(--gold-bright); }

  /* ---------- adminmodus: regels verwijderen ---------- */
  .regel-verwijder {
    position: absolute; top: 7px; right: 8px;
    background: none;
    border: 1px solid rgba(224,49,49,0.5);
    border-radius: 4px;
    color: var(--red);
    font-size: 12px;
    line-height: 1;
    padding: 4px 8px;
    cursor: pointer;
  }
  .regel-verwijder:active { transform: scale(0.92); }
  .regel-kaart .regel-team { padding-right: 40px; }
  .admin-badge {
    position: fixed;
    right: 10px;
    bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 30;
    display: none;
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--green);
    background: rgba(6,10,30,0.88);
    border: 1px solid rgba(212,175,55,0.6);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="trip" aria-hidden="true">
  <div class="ring r3"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r4"></div>
</div>
<div class="waas" aria-hidden="true"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fd4c0"/><stop offset="0.5" stop-color="#ff3df0"/><stop offset="1" stop-color="#ffd75e"/>
    </linearGradient>
  </defs>
</svg>

<div class="page">
  <h1>Het Wereldlied</h1>
  <div class="subtitle"><b>Het volkslied van de hele wereld</b> — op het refrein van ANOTR: Talk To You</div>
  <hr class="divider">

  <div id="inhoud"></div>
</div>

<!-- adminbadge: alleen zichtbaar in adminmodus -->
<button class="admin-badge" id="admin-badge" title="Adminmodus — tik om uit te loggen">🔑 admin</button>

<script src="/catalog.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const IDENT_KEY = 'kwimWereldliedIdentiteit';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  let hoofdstaat = null;   // /api/state — voor teamnamen, logo's, vlaggen
  let wereld = null;       // /api/wereldlied — de ronde zelf

  // adminmodus: zelfde sleutelmechanisme als de homepage (/?k=<sleutel>) —
  // een admin krijgt een 🗑-knop op elke ingezonden regel
  const SLEUTEL_OPSLAG = 'kwimAdminSleutel';
  let sleutel = '';
  let adminmodus = false;
  let identiteit = JSON.parse(localStorage.getItem(IDENT_KEY) || 'null');
  let vorigAantalRegels = -1;
  let overslaanBezig = false;
  let ringTimer = null;

  const teamVan = id => (hoofdstaat && hoofdstaat.teams.find(t => t.id === id)) || null;
  const teamNaam = id => (teamVan(id) || {}).naam || id;
  const teamVlag = id => { const t = teamVan(id); return t && t.land ? window.KWIM_VLAG(t.land) : ''; };

  async function laadHoofdstaat() {
    try {
      const res = await fetch('/api/state', { cache: 'no-store' });
      hoofdstaat = await res.json();
    } catch {}
  }

  let vorigeWereldJson = null;
  let geschiedenis = [];
  let bekekenVersie = null; // geopende eerdere versie (zingmodus)

  async function laadWereld(eerste = false) {
    try {
      const res = await fetch('/api/wereldlied', { cache: 'no-store' });
      const vers = await res.json();
      const json = JSON.stringify(vers);
      wereld = vers;
      // alleen opnieuw renderen als er echt iets veranderd is — anders wist elke
      // poll-tick de tekst die een team net aan het intikken is
      if (json !== vorigeWereldJson) {
        vorigeWereldJson = json;
        laadGeschiedenis(); // na elke staatwissel kan er een versie bijgekomen zijn
        render();
      }
    } catch {
      if (eerste) $('inhoud').innerHTML = '<div class="wacht-tekst">✗ verbinding mislukt — herlaad de pagina</div>';
    }
  }

  async function laadGeschiedenis() {
    try {
      const res = await fetch('/api/wereldlied/geschiedenis', { cache: 'no-store' });
      const vers = await res.json();
      if (JSON.stringify(vers) !== JSON.stringify(geschiedenis)) {
        geschiedenis = vers;
        // ververs de lijst alleen als hij in beeld kan zijn (geen invoerveld actief)
        if (wereld && (!wereld.actief || wereld.klaar)) render();
      }
    } catch {}
  }

  /* ================= spel starten / afbreken ================= */
  async function startWereldlied() {
    if (!confirm('Dit start het Wereldlied voor alle teams — iedereen kan meteen meedoen. Weet je het zeker?')) return;
    const btn = $('wl-start-btn');
    if (btn) btn.disabled = true;
    try {
      const res = await fetch('/api/wereldlied/start', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({})
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        wereld = data.staat;
        vorigeWereldJson = JSON.stringify(wereld);
        render();
      } else {
        alert(data.fout || 'Starten is niet gelukt — probeer het opnieuw');
        await laadWereld();
      }
    } catch {
      if (btn) btn.disabled = false;
    }
  }

  async function stopWereldlied() {
    if (!confirm('Dit stopt het Wereldlied voor alle teams — de regels tot nu toe gaan niet verloren, maar de ronde is voorbij. Weet je het zeker?')) return;
    try {
      await fetch('/api/wereldlied/reset', { method: 'POST' });
    } catch {}
    await laadWereld();
  }

  /* ================= team kiezen ================= */
  function renderPoort() {
    const teams = (wereld.volgorde.length ? wereld.volgorde : (hoofdstaat ? hoofdstaat.teams.map(t => t.id) : []))
      .map(id => teamVan(id)).filter(Boolean);
    const opties = teams.map(t => `<option value="${t.id}">${teamVlag(t.id)} ${escapeHtml(t.naam)}</option>`).join('');
    $('inhoud').innerHTML = `
      <div class="poort-panel">
        <p>🎤 Welk team ben jij?</p>
        <select id="wl-team">${opties}</select>
        <button class="btn-gold" id="wl-login-btn">Meedoen</button>
      </div>`;
    $('wl-login-btn').addEventListener('click', () => {
      identiteit = { teamId: $('wl-team').value };
      localStorage.setItem(IDENT_KEY, JSON.stringify(identiteit));
      render();
    });
  }

  /* ================= inzenden ================= */
  async function verzendRegel() {
    const veld = $('wl-tekst');
    const tekst = veld.value.trim();
    if (!tekst) return;
    veld.disabled = true;
    $('wl-verzend').disabled = true;
    try {
      const res = await fetch('/api/wereldlied/inzenden', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teamId: identiteit.teamId, tekst })
      });
      const data = await res.json();
      if (res.ok) {
        wereld = data.staat;
        vorigeWereldJson = JSON.stringify(wereld);
        render();
      } else {
        veld.disabled = false;
        $('wl-verzend').disabled = false;
      }
    } catch {
      veld.disabled = false;
      $('wl-verzend').disabled = false;
    }
  }

  /* ================= regel verwijderen (alleen adminmodus) ================= */
  async function verwijderRegel(index) {
    const r = wereld && wereld.regels[index];
    if (!r) return;
    if (!confirm(`Regel van ${teamNaam(r.teamId)} verwijderen? De originele refreinregel komt dan weer terug.`)) return;
    try {
      const res = await fetch('/api/wereldlied/verwijder', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + sleutel, 'Content-Type': 'application/json' },
        body: JSON.stringify({ index })
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        wereld = data.staat;
        vorigeWereldJson = JSON.stringify(wereld);
        render();
      } else {
        alert(data.fout || 'Verwijderen is niet gelukt — probeer het opnieuw.');
      }
    } catch {
      alert('Verwijderen is niet gelukt — probeer het opnieuw.');
    }
  }

  function verwijderKnop(r, i) {
    return adminmodus && r && !r.overgeslagen
      ? `<button class="regel-verwijder" data-index="${i}" title="Verwijder deze regel">🗑</button>`
      : '';
  }

  function bindVerwijderKnoppen() {
    document.querySelectorAll('.regel-verwijder').forEach(b =>
      b.addEventListener('click', () => verwijderRegel(Number(b.dataset.index))));
  }

  /* ================= countdown-ring ================= */
  function tekenRing(percentage, dringend) {
    const omtrek = 2 * Math.PI * 44;
    const fg = $('wl-ring-fg');
    if (!fg) return;
    fg.style.strokeDasharray = omtrek;
    fg.style.strokeDashoffset = omtrek * (1 - percentage);
    $('wl-ring-wrap').classList.toggle('dringend', dringend);
  }

  function updateRing() {
    if (!wereld || !wereld.actief || wereld.klaar || wereld.beurtStart === null) return;
    const resterend = wereld.beurtStart + wereld.duur * 1000 - Date.now();
    const getal = Math.max(0, Math.ceil(resterend / 1000));
    const el = $('wl-ring-getal');
    if (el) el.textContent = getal;
    tekenRing(Math.max(0, resterend) / (wereld.duur * 1000), getal <= 5);
    if (resterend <= 0 && !overslaanBezig) {
      overslaanBezig = true;
      fetch('/api/wereldlied/overslaan', { method: 'POST' })
        .then(res => res.json())
        .then(data => { wereld = data; vorigeWereldJson = JSON.stringify(wereld); overslaanBezig = false; render(); })
        .catch(() => { overslaanBezig = false; });
    }
  }

  /* ================= eerdere versies (zingmodus) ================= */
  // de zingbare regels van een bewaarde versie: altijd het vólledige refrein —
  // eigen zin waar die bestaat, en het origineel bij een gemiste beurt of
  // een afgebroken ronde (net zoals het eindscherm dat doet)
  function versieRegels(v) {
    const refrein = Array.isArray(v.refrein) && v.refrein.length ? v.refrein : null;
    if (refrein) {
      return refrein.map((origineel, i) => {
        const r = v.regels && v.regels[i];
        return r && !r.overgeslagen ? r.tekst : origineel;
      });
    }
    // oude versies zonder refrein in de data: alleen de echte inzendingen
    return (v.regels || []).filter(r => !r.overgeslagen).map(r => r.tekst);
  }

  function renderGeschiedenisLijst() {
    if (!geschiedenis.length) return '';
    const items = geschiedenis.map((v, i) => {
      const d = new Date(v.geeindigd).toLocaleString('nl-NL', { dateStyle: 'medium', timeStyle: 'short' });
      const regels = versieRegels(v);
      return `<button class="versie-knop" data-versie="${i}">
        <span class="versie-label">🎤 ${escapeHtml(d)}${v.klaar ? '' : ' · afgebroken'}</span>
        <span class="versie-preview">${escapeHtml(regels[0] || '')}${regels.length > 1 ? ' …' : ''}</span>
      </button>`;
    }).join('');
    return `<div class="versie-lijst"><div class="versie-kop">📜 Eerdere Wereldliederen — tik om te zingen</div>${items}</div>`;
  }

  function bindVersieKnoppen() {
    document.querySelectorAll('.versie-knop').forEach(b => b.addEventListener('click', () => {
      bekekenVersie = geschiedenis[Number(b.dataset.versie)];
      render();
    }));
  }

  function renderVersie() {
    const v = bekekenVersie;
    const datum = new Date(v.geeindigd).toLocaleString('nl-NL', { dateStyle: 'long', timeStyle: 'short' });
    $('inhoud').innerHTML = `
      <div class="klaar-banner">🎤 Zingmodus</div>
      <div class="versie-datum">${escapeHtml(datum)}${v.klaar ? '' : ' · afgebroken'}</div>
      <div class="voorlezen">${versieRegels(v).map(escapeHtml).join('<br>')}</div>
      <div class="zing-hint">🎵 op de melodie van ANOTR — Talk To You (alleen het refrein, de rest blijven we stil)</div>
      <button class="btn-gold" id="wl-terug" style="margin-top:20px">← Terug</button>`;
    $('wl-terug').addEventListener('click', () => { bekekenVersie = null; render(); });
  }

  /* ================= hoofdscherm ================= */
  const refreinVan = () => (Array.isArray(wereld.refrein) && wereld.refrein.length) ? wereld.refrein : null;

  // de definitieve tekst van regel i: de nieuwe zin, of de originele regel als de beurt verstreek
  function definitieveRegel(i) {
    const r = wereld.regels[i];
    const refrein = refreinVan();
    if (r && !r.overgeslagen) return r.tekst;
    return refrein ? refrein[i] : null;
  }

  // volledige refrein-kaart: elke regel toont het origineel + status (klaar / nu / straks)
  function renderKetting() {
    const refrein = refreinVan();
    if (!refrein) {
      // oude ronde zonder refrein in de staat — toon de klassieke ketting
      return wereld.regels.map((r, i) => `<div class="regel-kaart">
        ${verwijderKnop(r, i)}
        <div class="regel-team">${teamVlag(r.teamId)} ${escapeHtml(teamNaam(r.teamId))}</div>
        ${r.overgeslagen
          ? `<div class="regel-tekst overgeslagen">${r.verwijderd ? '🗑 verwijderd door de Federatie' : '⏭ tijd verstreken — geen regel'}</div>`
          : `<div class="regel-tekst">${escapeHtml(r.tekst)}</div>`}
      </div>`).join('');
    }
    return refrein.map((origineel, i) => {
      const r = wereld.regels[i];
      const isNu = !wereld.klaar && i === wereld.huidige;
      const teamId = wereld.volgorde[i];
      const nieuw = r && i === wereld.regels.length - 1 && wereld.regels.length > vorigAantalRegels && vorigAantalRegels >= 0;
      let inhoud;
      if (r) {
        inhoud = r.overgeslagen
          ? `<div class="regel-origineel">♪ ${escapeHtml(origineel)}</div>
             <div class="regel-tekst overgeslagen">${r.verwijderd ? '🗑 verwijderd door de Federatie — de originele regel geldt weer' : '⏭ tijd om — de originele regel blijft staan'}</div>`
          : `<div class="regel-origineel doorgestreept">♪ ${escapeHtml(origineel)}</div>
             <div class="regel-tekst">${escapeHtml(r.tekst)}</div>`;
      } else if (isNu) {
        inhoud = `<div class="regel-origineel">♪ ${escapeHtml(origineel)}</div>
          <div class="regel-tekst nu-bezig">✏️ wordt nu overschreven…</div>`;
      } else {
        inhoud = `<div class="regel-origineel">♪ ${escapeHtml(origineel)}</div>`;
      }
      return `<div class="regel-kaart${isNu ? ' nu' : ''}${!r && !isNu ? ' straks' : ''}${nieuw ? ' nieuw' : ''}">
        ${verwijderKnop(r, i)}
        <div class="regel-team">${i + 1}/${refrein.length} · ${teamVlag(teamId)} ${escapeHtml(teamNaam(teamId))}${isNu ? ' — NU' : ''}</div>
        ${inhoud}
      </div>`;
    }).join('');
  }

  function render() {
    if (!wereld) return;

    // een geopende eerdere versie gaat vóór alles — zingmodus
    if (bekekenVersie) { renderVersie(); return; }

    // bewaar wat er al in het invoerveld staat, zodat een tussentijdse render
    // (bv. na terugkeren naar het tabblad) de getikte zin niet weggooit
    const bestaandVeld = $('wl-tekst');
    const bewaardeTekst = bestaandVeld ? bestaandVeld.value : '';
    const hadFocus = bestaandVeld && document.activeElement === bestaandVeld;

    if (!wereld.actief) {
      $('inhoud').innerHTML = `
        <div class="wacht">
          <div class="wacht-tekst"><span class="stip"></span>Wacht tot het Wereldlied start…</div>
          <button class="btn-gold" id="wl-start-btn" style="margin-top:24px;max-width:280px">▶ Start het Wereldlied</button>
          ${renderGeschiedenisLijst()}
        </div>`;
      vorigAantalRegels = -1;
      $('wl-start-btn').addEventListener('click', startWereldlied);
      bindVersieKnoppen();
      return;
    }

    if (!identiteit) { renderPoort(); return; }

    const huidigeTeamId = !wereld.klaar ? wereld.volgorde[wereld.huidige] : null;
    const jijBent = huidigeTeamId === identiteit.teamId;

    const refrein = refreinVan();
    const huidigeOrigineel = refrein && !wereld.klaar ? refrein[wereld.huidige] : null;

    let boven = '';
    if (wereld.klaar) {
      boven = `<div class="klaar-banner">🌍 Het Wereldlied is compleet — zingen maar!</div>`;
    } else {
      boven = `
        <div class="beurt-kop">
          <div class="beurt-label">${jijBent ? 'Jullie zijn aan de beurt' : 'Aan de beurt'}${refrein ? ` — regel ${wereld.huidige + 1} van ${refrein.length}` : ''}</div>
          <div class="beurt-team">${teamVlag(huidigeTeamId)} ${escapeHtml(teamNaam(huidigeTeamId))}</div>
        </div>
        <div class="ring-wrap" id="wl-ring-wrap">
          <svg class="ring-timer" viewBox="0 0 96 96">
            <circle class="ring-bg" cx="48" cy="48" r="44"></circle>
            <circle class="ring-fg" id="wl-ring-fg" cx="48" cy="48" r="44"></circle>
          </svg>
          <div class="ring-getal" id="wl-ring-getal">${wereld.duur}</div>
        </div>`;
      if (jijBent) {
        boven += `
          <div class="invoer-blok">
            ${huidigeOrigineel ? `
              <div class="overschrijf-prompt">
                <div class="overschrijf-label">jullie overschrijven deze regel:</div>
                <div class="overschrijf-origineel">♪ ${escapeHtml(huidigeOrigineel)}</div>
              </div>` : ''}
            <textarea class="invoer-tekst" id="wl-tekst" maxlength="140" placeholder="${huidigeOrigineel ? 'Jullie nieuwe versie van deze regel…' : 'Plak hier jullie zin aan het Wereldlied…'}" autofocus></textarea>
            <div class="invoer-teller" id="wl-teller">140 tekens over</div>
            <button class="btn-gold" id="wl-verzend">Zet vast in het Wereldlied</button>
          </div>`;
      } else {
        boven += `<div class="wacht-op">wacht tot ${escapeHtml(teamNaam(huidigeTeamId))} ${huidigeOrigineel ? `regel ${wereld.huidige + 1} (&ldquo;${escapeHtml(huidigeOrigineel)}&rdquo;) overschrijft` : 'hun zin intikt'}…</div>`;
      }
    }

    // teamwissel bovenin: altijd zichtbaar zolang de ronde live is
    const alleTeams = hoofdstaat ? hoofdstaat.teams : [];
    const teamBalk = alleTeams.length ? `
      <div class="team-balk">
        <span>jij bent</span>
        <select id="wl-team-switch">${alleTeams.map(t =>
          `<option value="${t.id}"${t.id === identiteit.teamId ? ' selected' : ''}>${teamVlag(t.id)} ${escapeHtml(t.naam)}</option>`).join('')}</select>
      </div>` : '';

    $('inhoud').innerHTML = `
      ${teamBalk}
      ${boven}
      <div class="ketting">${renderKetting()}</div>
      ${wereld.klaar
        ? `<div class="voorlezen">${refrein
            ? refrein.map((_, i) => escapeHtml(definitieveRegel(i))).join('<br>')
            : wereld.regels.filter(r => !r.overgeslagen).map(r => escapeHtml(r.tekst)).join(' ')}</div>
           <div class="zing-hint">🎵 op de melodie van ANOTR — Talk To You (alleen het refrein, de rest blijven we stil)</div>
           <button class="btn-gold" id="wl-start-btn" style="margin-top:20px">▶ Nieuw Wereldlied starten</button>
           ${renderGeschiedenisLijst()}`
        : ''}
      ${!wereld.klaar ? `<button class="uitloggen" id="wl-stop-btn">⛔ stop het Wereldlied voor iedereen</button>` : ''}
    `;
    vorigAantalRegels = wereld.regels.length;

    if (!wereld.klaar) { tekenRing(1, false); updateRing(); }

    const veld = $('wl-tekst');
    if (veld) {
      if (bewaardeTekst) {
        veld.value = bewaardeTekst;
        $('wl-teller').textContent = (140 - veld.value.length) + ' tekens over';
      }
      veld.addEventListener('input', () => { $('wl-teller').textContent = (140 - veld.value.length) + ' tekens over'; });
      if (hadFocus || !bewaardeTekst) veld.focus();
      if (bewaardeTekst) veld.setSelectionRange(veld.value.length, veld.value.length);
    }
    const verzendBtn = $('wl-verzend');
    if (verzendBtn) verzendBtn.addEventListener('click', verzendRegel);
    const teamSwitch = $('wl-team-switch');
    if (teamSwitch) teamSwitch.addEventListener('change', () => {
      identiteit = { teamId: teamSwitch.value };
      localStorage.setItem(IDENT_KEY, JSON.stringify(identiteit));
      render();
    });
    const startBtn = $('wl-start-btn');
    if (startBtn) startBtn.addEventListener('click', startWereldlied);
    const stopBtn = $('wl-stop-btn');
    if (stopBtn) stopBtn.addEventListener('click', stopWereldlied);
    bindVersieKnoppen();
    bindVerwijderKnoppen();
  }

  /* ================= start + live verversen ================= */
  $('admin-badge').addEventListener('click', () => {
    if (!confirm('Adminmodus verlaten? Je hebt de adminlink nodig om weer in te loggen.')) return;
    localStorage.removeItem(SLEUTEL_OPSLAG);
    location.reload();
  });

  (async () => {
    // adminsleutel uit ?k= of localStorage verifiëren vóór de eerste render,
    // zodat de 🗑-knoppen er meteen staan
    const urlSleutel = new URL(location.href).searchParams.get('k');
    const kandidaat = urlSleutel || localStorage.getItem(SLEUTEL_OPSLAG) || '';
    if (kandidaat) {
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Authorization': 'Bearer ' + kandidaat } });
        if (res.ok) {
          sleutel = kandidaat;
          adminmodus = true;
          localStorage.setItem(SLEUTEL_OPSLAG, sleutel);
        } else {
          localStorage.removeItem(SLEUTEL_OPSLAG);
        }
      } catch {}
      if (urlSleutel) history.replaceState(null, '', location.pathname);
    }
    if (adminmodus) $('admin-badge').style.display = 'block';
    await laadHoofdstaat();
    await laadGeschiedenis();
    await laadWereld(true);
  })();
  setInterval(laadWereld, 2500);
  setInterval(laadHoofdstaat, 10000);
  clearInterval(ringTimer);
  ringTimer = setInterval(updateRing, 250);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) laadWereld(); });
</script>
</body>
</html>
