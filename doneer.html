<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WK WAANZIN™ — Doneer aan de Federatie</title>
<meta name="theme-color" content="#060a1e">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --navy: #0a1030;
    --navy-deep: #060a1e;
    --gold: #d4af37;
    --gold-bright: #ffd75e;
    --white: #f4f2ec;
    --red: #e03131;
    --teal: #1fd4c0;
    --magenta: #ff3df0;
    --green: #3ddc84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  html { -webkit-text-size-adjust: 100%; background: var(--navy-deep); }
  body {
    font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--navy-deep);
    color: var(--white);
    min-height: 100%;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  button, input, select { font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  button { user-select: none; -webkit-user-select: none; cursor: pointer; }

  /* ---------- de permanente trip (zelfde als de homepage) ---------- */
  .trip {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    --spd: 30s;
    animation: hueSpin 22s linear infinite;
  }
  .ring { position: absolute; width: 130vmax; height: 130vmax; border-radius: 50%; opacity: 0.14; will-change: transform; }
  .r1 { background: repeating-conic-gradient(from 0deg, var(--gold-bright) 0 8deg, transparent 8deg 24deg); animation: spin var(--spd) linear infinite; }
  .r2 { background: repeating-radial-gradient(circle, rgba(255,61,240,0.7) 0 3vmax, transparent 3vmax 7vmax); animation: spinRev calc(var(--spd) * 0.7) linear infinite, breathe 7s ease-in-out infinite; }
  .r3 { background: conic-gradient(var(--teal), var(--magenta), var(--gold-bright), var(--teal)); filter: blur(32px); animation: spin calc(var(--spd) * 0.5) linear infinite; mix-blend-mode: screen; }
  .r4 { background: repeating-conic-gradient(from 10deg, rgba(31,212,192,0.8) 0 4deg, transparent 4deg 18deg); animation: spinRev calc(var(--spd) * 0.35) linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinRev { to { transform: rotate(-360deg); } }
  @keyframes breathe { 0%,100% { scale: 1; } 50% { scale: 1.25; } }
  @keyframes hueSpin { to { filter: hue-rotate(360deg); } }
  .waas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 110% 80% at 50% 40%, rgba(6,10,30,0.25) 0%, rgba(6,10,30,0.78) 100%);
  }

  .page {
    width: 100%;
    max-width: 480px;
    padding: 26px 20px calc(40px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: clamp(28px, 8.5vw, 38px);
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
    text-shadow: 0 0 16px rgba(61,220,132,0.4);
  }
  .subtitle {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(244,242,236,0.6);
  }
  .divider {
    width: 70%; margin: 20px 0; border: none; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .stap-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(244,242,236,0.4); margin-bottom: 16px; }

  /* ---------- intro-portret ---------- */
  .portret {
    width: 140px; height: 140px;
    margin: 0 auto 16px;
    border-radius: 50%;
    border: 2px solid var(--green);
    background: radial-gradient(circle at 50% 38%, rgba(61,220,132,0.3), rgba(6,10,30,0.92) 72%);
    display: grid; place-items: center;
    box-shadow: 0 0 30px rgba(61,220,132,0.45);
    overflow: hidden;
    position: relative;
  }
  .portret img { width: 100%; height: 100%; object-fit: cover; }
  .portret .emoji { font-size: 62px; }

  .flavor { font-size: 12.5px; line-height: 1.7; color: rgba(244,242,236,0.7); margin: 4px 0 22px; }
  .flavor b { color: var(--gold-bright); }
  .fineprint { font-size: 9.5px; letter-spacing: 0.5px; line-height: 1.6; color: rgba(244,242,236,0.35); margin-top: 14px; text-transform: uppercase; }

  .btn-groen {
    width: 100%; margin-top: 4px;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 18px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--navy-deep);
    background: linear-gradient(180deg, #6bf0a3, var(--green));
    border: none; border-radius: 4px; padding: 14px;
  }
  .btn-groen:active { transform: scale(0.98); }
  .btn-outline {
    width: 100%; margin-top: 10px;
    font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(244,242,236,0.6);
    background: none; border: 1px solid rgba(212,175,55,0.35); border-radius: 4px;
    padding: 11px;
  }
  .btn-outline:active { transform: scale(0.98); }

  /* ---------- bedrag-stap ---------- */
  .bedrag-blok { width: 100%; text-align: left; }
  .veld-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(244,242,236,0.5); margin-bottom: 7px; }
  .veld { margin-bottom: 16px; }
  .bedrag-input, .betaal-input, select {
    width: 100%;
    font-size: 16px;
    color: var(--white);
    background: rgba(6,10,30,0.8);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 6px;
    padding: 12px 13px;
    outline: none;
  }
  .bedrag-input:focus, .betaal-input:focus, select:focus { border-color: var(--gold-bright); box-shadow: 0 0 12px rgba(212,175,55,0.25); }
  .bedrag-groot {
    text-align: center;
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: 42px;
    background: linear-gradient(175deg, var(--gold-bright) 20%, var(--gold) 60%, #8a6d1f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 18px;
  }
  .snelbedragen { display: flex; gap: 8px; margin-bottom: 18px; }
  .snelbedrag-knop {
    flex: 1;
    font-size: 12.5px; letter-spacing: 1px;
    color: var(--gold-bright);
    background: rgba(212,175,55,0.08);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    padding: 9px 4px;
  }
  .snelbedrag-knop.gekozen { background: linear-gradient(180deg, rgba(212,175,55,0.32), rgba(212,175,55,0.14)); box-shadow: 0 0 10px rgba(212,175,55,0.3); }

  /* ---------- nep-betaalscherm ---------- */
  .betaal-kaart {
    width: 100%; text-align: left;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    padding: 18px;
  }
  .betaal-merk { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(244,242,236,0.45); margin-bottom: 14px; text-align: center; }
  .betaal-merk b { color: var(--gold-bright); }
  .betaal-rij { display: flex; gap: 10px; }
  .betaal-rij .veld { flex: 1; }
  .nep-melding {
    margin-top: 14px;
    font-size: 10px; letter-spacing: 0.5px; line-height: 1.6;
    color: rgba(244,242,236,0.4);
    text-align: center;
  }
  .verwerken { font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-bright); padding: 30px 0; }
  .verwerken .stip { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold-bright); margin-right: 8px; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0.15; } }

  /* ---------- keuzekaarten (bank / team) ---------- */
  .keuze-lijst { width: 100%; display: flex; flex-direction: column; gap: 10px; text-align: left; }
  .keuze-kaart {
    width: 100%;
    display: block;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    padding: 12px 14px;
    color: inherit;
    text-align: left;
  }
  .keuze-kaart:active { transform: scale(0.98); }
  .keuze-kaart.gekozen { border-color: var(--gold-bright); box-shadow: 0 0 14px rgba(212,175,55,0.35); background: linear-gradient(180deg, rgba(212,175,55,0.14), rgba(255,255,255,0.02)); }
  .keuze-naam { font-size: 14.5px; font-weight: 700; letter-spacing: 0.5px; }
  .keuze-sub { font-size: 11px; color: rgba(244,242,236,0.55); margin-top: 2px; }

  /* ---------- team-bevoordelen stap ---------- */
  .team-kaart {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    padding: 10px 14px;
    text-align: left;
  }
  .team-kaart-naam { flex: 1; min-width: 0; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-knoppen { display: flex; gap: 6px; flex-shrink: 0; }
  .team-plus, .team-min {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    border-radius: 4px; padding: 8px 10px; border: 1px solid;
    background: none;
  }
  .team-plus { color: var(--green); border-color: rgba(61,220,132,0.5); }
  .team-min { color: var(--red); border-color: rgba(224,49,49,0.5); }
  .team-plus:active, .team-min:active { transform: scale(0.94); }

  /* ---------- ontvangstbewijs ---------- */
  .bon {
    width: 100%; text-align: left;
    border: 2px solid var(--gold);
    border-radius: 10px;
    background: radial-gradient(ellipse 120% 70% at 50% 0%, rgba(212,175,55,0.12), transparent 55%), linear-gradient(180deg, #121a3e, var(--navy-deep));
    padding: 20px 20px 22px;
    box-shadow: 0 0 40px rgba(212,175,55,0.2);
  }
  .bon-kop { font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif; font-size: 22px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-bright); margin-bottom: 12px; text-align: center; }
  .bon-regel { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; padding: 7px 0; border-bottom: 1px dashed rgba(212,175,55,0.2); }
  .bon-regel:last-child { border-bottom: none; }
  .bon-label { color: rgba(244,242,236,0.5); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
  .bon-waarde { text-align: right; font-weight: 700; }
  .bon-waarde.plus { color: var(--green); }
  .bon-waarde.min { color: var(--red); }

  .terug { margin-top: 24px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(212,175,55,0.7); text-decoration: none; background: none; border: none; }

  /* ---------- admin: foto wijzigen ---------- */
  .foto-bewerk-knop {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(244,242,236,0.5);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 4px;
    padding: 6px 12px;
    background: none;
    margin-bottom: 14px;
  }
  .foto-edit { display: none; margin-bottom: 16px; }
  .foto-edit.open { display: block; }
  .foto-knop {
    display: inline-block;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold-bright);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 4px;
    padding: 9px 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    margin-right: 8px;
  }
  .foto-knop input { display: none; }
  .foto-weg {
    background: none; border: 1px solid rgba(224,49,49,0.5); border-radius: 4px;
    color: var(--red); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 9px 12px;
  }
  .foto-status { margin-top: 8px; font-size: 11px; letter-spacing: 1px; }
  .foto-status.bezig { color: var(--gold-bright); }
  .foto-status.ok { color: var(--green); }
  .foto-status.fout { color: var(--red); }

  .admin-badge {
    position: fixed;
    right: 10px;
    bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 30;
    display: none;
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--green);
    background: rgba(6,10,30,0.88);
    border: 1px solid rgba(212,175,55,0.6);
    border-radius: 6px;
    padding: 6px 10px;
  }
</style>
</head>
<body>

<div class="trip" aria-hidden="true">
  <div class="ring r3"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r4"></div>
</div>
<div class="waas" aria-hidden="true"></div>

<div class="page">
  <div id="inhoud"></div>
  <a class="terug" href="/">← terug naar het klassement</a>
</div>

<button class="admin-badge" id="admin-badge" title="Adminmodus — tik om uit te loggen">🔑 admin</button>

<script>
  const $ = id => document.getElementById(id);
  const SLEUTEL_OPSLAG = 'kwimAdminSleutel';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  const CURRENCIES = [
    { code: 'EUR', naam: 'Euro',                              symbool: '€' },
    { code: 'USD', naam: 'US Dollar',                         symbool: '$' },
    { code: 'CHF', naam: 'Zwitserse Frank',                   symbool: 'CHF' },
    { code: 'GBP', naam: 'Brits Pond',                        symbool: '£' },
    { code: 'XXX', naam: 'Ongemarkeerde Biljetten (contant)', symbool: '💵' }
  ];

  const BANKEN = [
    { id: 'panama',      vlag: '🇵🇦', naam: 'Infantino Legacy Trust S.A.',            plaats: 'Panama-Stad, Panama' },
    { id: 'zwitserland', vlag: '🇨🇭', naam: 'FIFA Discretie & Vermogensbeheer AG',    plaats: 'Zürich, Zwitserland' },
    { id: 'kaaiman',     vlag: '🇰🇾', naam: 'Offshore Voetbalfonds Ltd.',             plaats: 'George Town, Kaaimaneilanden' },
    { id: 'luxemburg',   vlag: '🇱🇺', naam: 'Silent Sponsorship Holding S.à r.l.',    plaats: 'Luxemburg-Stad, Luxemburg' },
    { id: 'bvi',         vlag: '🇻🇬', naam: 'Anonieme Voetbalstichting BVI',          plaats: 'Road Town, Britse Maagdeneilanden' },
    { id: 'monaco',      vlag: '🇲🇨', naam: 'Discrete Sportbelangen SAM',             plaats: 'Monte Carlo, Monaco' }
  ];

  let hoofdstaat = null;
  let sleutel = '';
  let adminmodus = false;

  // ---- de wizard-staat ----
  let stap = 'intro'; // intro | bedrag | betaling | verwerken | bank | team | klaar
  const donatie = { bedrag: 50, valuta: 'EUR', bank: null, teamId: null, delta: null, gelukt: null };

  async function laadStaat() {
    try {
      const res = await fetch('/api/state', { cache: 'no-store' });
      hoofdstaat = await res.json();
    } catch {}
  }

  function currencyVan(code) { return CURRENCIES.find(c => c.code === code) || CURRENCIES[0]; }
  function bankVan(id) { return BANKEN.find(b => b.id === id); }
  function teamVan(id) { return hoofdstaat && hoofdstaat.teams.find(t => t.id === id); }

  function gaNaar(nieuweStap) { stap = nieuweStap; render(); window.scrollTo(0, 0); }

  /* ================= stappen ================= */

  function renderIntro() {
    const foto = hoofdstaat && hoofdstaat.doneerFoto;
    const actief = !hoofdstaat || hoofdstaat.doneerActief !== false;
    return `
      <div class="portret">
        ${foto ? `<img src="${foto}" alt="">` : `<span class="emoji">🕴️</span>`}
      </div>
      <h1>Doneer aan<br>de Federatie</h1>
      <div class="subtitle">Voor de "goede" zaak</div>
      <hr class="divider">
      <div class="flavor">
        De Federatie erkent officieel geen enkel verband tussen deze donaties en de eindstand van het klassement.
        Toch blijkt vrijgevigheid, in de praktijk, opvallend vaak beloond te worden. <b>Puur toeval</b>, uiteraard.
      </div>
      ${adminmodus ? `
        <button type="button" class="foto-bewerk-knop" id="foto-bewerk-knop">✏️ Portret wijzigen (admin)</button>
        <div class="foto-edit" id="foto-edit">
          <label class="foto-knop" id="foto-knop">📷 Kies foto<input type="file" accept="image/*" id="foto-input"></label>
          ${foto ? `<button type="button" class="foto-weg" id="foto-weg">✕ Verwijder</button>` : ''}
          <div class="foto-status" id="foto-status"></div>
        </div>
        <button type="button" class="foto-bewerk-knop" id="actief-toggle-knop">${actief ? '🔌 Omkoping staat AAN — zet UIT (admin)' : '🔌 Omkoping staat UIT — zet AAN (admin)'}</button>
        <div class="foto-status" id="actief-status"></div>
      ` : ''}
      <button class="btn-groen" id="start-btn">Start donatie →</button>
      <div class="fineprint">Volstrekt fictieve betaalflow. Er wordt niets echt afgeschreven — dit is een easter egg.</div>
    `;
  }

  function koppelIntro() {
    $('start-btn').addEventListener('click', () => gaNaar('bedrag'));
    if (!adminmodus) return;
    const knop = $('foto-bewerk-knop');
    if (knop) knop.addEventListener('click', () => { $('foto-edit').classList.toggle('open'); });
    const input = $('foto-input');
    if (input) input.addEventListener('change', onFotoGekozen);
    const weg = $('foto-weg');
    if (weg) weg.addEventListener('click', async () => {
      zetFotoStatus('● bezig…', 'bezig');
      try {
        await slaDoneerFotoOp(null);
        zetFotoStatus('✓ verwijderd', 'ok');
        setTimeout(render, 600);
      } catch { zetFotoStatus('✗ mislukt', 'fout'); }
    });
    const actiefKnop = $('actief-toggle-knop');
    if (actiefKnop) actiefKnop.addEventListener('click', async () => {
      const nieuweWaarde = !(hoofdstaat && hoofdstaat.doneerActief !== false);
      actiefKnop.disabled = true;
      zetActiefStatus('● bezig…', 'bezig');
      try {
        await zetDoneerActief(nieuweWaarde);
        zetActiefStatus('✓ opgeslagen', 'ok');
        setTimeout(render, 600);
      } catch {
        zetActiefStatus('✗ mislukt', 'fout');
        actiefKnop.disabled = false;
      }
    });
  }

  function renderBedrag() {
    const snel = [10, 25, 50, 100, 250];
    return `
      <div class="stap-label">Stap 1 van 4 — Bedrag</div>
      <h1>Hoeveel<br>wordt het?</h1>
      <hr class="divider">
      <div class="bedrag-blok">
        <div class="bedrag-groot" id="bedrag-groot">${currencyVan(donatie.valuta).symbool} ${donatie.bedrag}</div>
        <div class="snelbedragen" id="snelbedragen">
          ${snel.map(b => `<button type="button" class="snelbedrag-knop ${donatie.bedrag === b ? 'gekozen' : ''}" data-bedrag="${b}">${b}</button>`).join('')}
        </div>
        <div class="veld">
          <div class="veld-label">Eigen bedrag</div>
          <input class="bedrag-input" id="bedrag-input" type="number" min="1" max="1000000" step="1" value="${donatie.bedrag}">
        </div>
        <div class="veld">
          <div class="veld-label">Valuta</div>
          <select id="valuta-select">
            ${CURRENCIES.map(c => `<option value="${c.code}" ${donatie.valuta === c.code ? 'selected' : ''}>${c.symbool} — ${escapeHtml(c.naam)}</option>`).join('')}
          </select>
        </div>
      </div>
      <button class="btn-groen" id="verder-btn">Verder →</button>
      <button class="btn-outline" id="terug-btn">← vorige stap</button>
    `;
  }

  function koppelBedrag() {
    $('snelbedragen').querySelectorAll('.snelbedrag-knop').forEach(k => {
      k.addEventListener('click', () => {
        donatie.bedrag = Number(k.dataset.bedrag);
        render();
      });
    });
    $('bedrag-input').addEventListener('input', e => {
      const v = Number(e.target.value);
      donatie.bedrag = Number.isFinite(v) && v > 0 ? v : donatie.bedrag;
      $('bedrag-groot').textContent = `${currencyVan(donatie.valuta).symbool} ${e.target.value || 0}`;
    });
    $('valuta-select').addEventListener('change', e => {
      donatie.valuta = e.target.value;
      $('bedrag-groot').textContent = `${currencyVan(donatie.valuta).symbool} ${donatie.bedrag}`;
    });
    $('verder-btn').addEventListener('click', () => {
      const v = Number($('bedrag-input').value);
      if (Number.isFinite(v) && v > 0) donatie.bedrag = v;
      gaNaar('betaling');
    });
    $('terug-btn').addEventListener('click', () => gaNaar('intro'));
  }

  function renderBetaling() {
    return `
      <div class="stap-label">Stap 2 van 4 — Betaling</div>
      <h1>Betaalgegevens</h1>
      <hr class="divider">
      <div class="betaal-kaart">
        <div class="betaal-merk"><b>NepPay</b> — volstrekt fictieve betaalprovider</div>
        <div class="veld">
          <div class="veld-label">Naam op de kaart</div>
          <input class="betaal-input" id="naam-input" type="text" placeholder="G. Infantino" maxlength="60">
        </div>
        <div class="veld">
          <div class="veld-label">Kaartnummer</div>
          <input class="betaal-input" id="kaart-input" type="text" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
        </div>
        <div class="betaal-rij">
          <div class="veld">
            <div class="veld-label">Vervaldatum</div>
            <input class="betaal-input" id="verval-input" type="text" placeholder="MM/JJ" maxlength="5">
          </div>
          <div class="veld">
            <div class="veld-label">CVC</div>
            <input class="betaal-input" id="cvc-input" type="text" placeholder="•••" maxlength="4" inputmode="numeric">
          </div>
        </div>
        <div class="nep-melding">Dit formulier verstuurt niets naar een server. Vul gerust onzin in — Mickey Mouse werkt uitstekend.</div>
      </div>
      <button class="btn-groen" id="betaal-btn">Betaal ${currencyVan(donatie.valuta).symbool} ${donatie.bedrag} →</button>
      <button class="btn-outline" id="terug-btn">← vorige stap</button>
    `;
  }

  function koppelBetaling() {
    $('betaal-btn').addEventListener('click', () => {
      stap = 'verwerken';
      render();
      setTimeout(() => gaNaar('bank'), 1100);
    });
    $('terug-btn').addEventListener('click', () => gaNaar('bedrag'));
  }

  function renderVerwerken() {
    return `
      <div class="verwerken"><span class="stip"></span>Transactie wordt "geverifieerd"…</div>
    `;
  }

  function renderBank() {
    return `
      <div class="stap-label">Stap 3 van 4 — Bestemming</div>
      <h1>Naar welke<br>rekening?</h1>
      <div class="subtitle">Kies een discrete bestemming voor je donatie</div>
      <hr class="divider">
      <div class="keuze-lijst" id="bank-lijst">
        ${BANKEN.map(b => `
          <button type="button" class="keuze-kaart ${donatie.bank === b.id ? 'gekozen' : ''}" data-bank="${b.id}">
            <div class="keuze-naam">${b.vlag} ${escapeHtml(b.naam)}</div>
            <div class="keuze-sub">${escapeHtml(b.plaats)}</div>
          </button>
        `).join('')}
      </div>
      <button class="btn-groen" id="verder-btn" ${donatie.bank ? '' : 'disabled'} style="${donatie.bank ? '' : 'opacity:0.4;'}">Verder →</button>
      <button class="btn-outline" id="terug-btn">← vorige stap</button>
    `;
  }

  function koppelBank() {
    $('bank-lijst').querySelectorAll('.keuze-kaart').forEach(k => {
      k.addEventListener('click', () => {
        donatie.bank = k.dataset.bank;
        render();
      });
    });
    const verder = $('verder-btn');
    if (donatie.bank) verder.addEventListener('click', () => {
      const actief = !hoofdstaat || hoofdstaat.doneerActief !== false;
      gaNaar(actief ? 'team' : 'klaar');
    });
    $('terug-btn').addEventListener('click', () => gaNaar('betaling'));
  }

  function renderTeam() {
    const teams = (hoofdstaat && hoofdstaat.teams) || [];
    return `
      <div class="stap-label">Stap 4 van 4 — De echte reden</div>
      <h1>Wie verdient<br>jouw steun?</h1>
      <div class="subtitle">Bevoordeel of benadeel een team met dit "donatie"-punt</div>
      <hr class="divider">
      <div class="keuze-lijst" id="team-lijst">
        ${teams.map(t => `
          <div class="team-kaart">
            <div class="team-kaart-naam">${escapeHtml(t.naam)}</div>
            <div class="team-knoppen">
              <button type="button" class="team-plus" data-team="${t.id}" data-delta="1">🎁 +1</button>
              <button type="button" class="team-min" data-team="${t.id}" data-delta="-1">⚠️ −1</button>
            </div>
          </div>
        `).join('')}
      </div>
      <button class="btn-outline" id="terug-btn">← vorige stap</button>
    `;
  }

  function koppelTeam() {
    $('team-lijst').querySelectorAll('button[data-team]').forEach(k => {
      k.addEventListener('click', async () => {
        const teamId = k.dataset.team;
        const delta = Number(k.dataset.delta);
        k.disabled = true;
        try {
          const res = await fetch('/api/doneer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ teamId, delta })
          });
          if (!res.ok) throw new Error(res.status);
          const uitkomst = await res.json();
          hoofdstaat = uitkomst.staat;
          donatie.teamId = teamId;
          donatie.delta = delta;
          donatie.gelukt = uitkomst.gelukt;
          gaNaar('klaar');
        } catch {
          k.disabled = false;
          alert('De "bank" wijst de transactie af — probeer het opnieuw.');
        }
      });
    });
    $('terug-btn').addEventListener('click', () => gaNaar('bank'));
  }

  function renderKlaar() {
    const bank = bankVan(donatie.bank);
    const c = currencyVan(donatie.valuta);

    // omkoping stond uit voor deze donatie — geen team gekozen, gewoon een bedankje
    if (!donatie.teamId) {
      return `
        <div class="stap-label">Bedankt</div>
        <h1>Donatie<br>voltooid</h1>
        <hr class="divider">
        <div class="bon">
          <div class="bon-kop">✓ Ontvangstbewijs</div>
          <div class="bon-regel"><span class="bon-label">Bedrag</span><span class="bon-waarde">${c.symbool} ${donatie.bedrag}</span></div>
          <div class="bon-regel"><span class="bon-label">Bestemming</span><span class="bon-waarde">${bank ? bank.vlag + ' ' + escapeHtml(bank.naam) : '—'}</span></div>
        </div>
        <div class="flavor" style="margin-top:18px;">
          Deze donatie was geheel legaal, volledig transparant en op geen enkele wijze bedoeld om de einduitslag te beïnvloeden.
          De Federatie dankt u voor uw vertrouwen.
        </div>
        <button class="btn-groen" id="nog-een-btn">Nog een donatie doen</button>
      `;
    }

    const team = teamVan(donatie.teamId);
    const gelukt = donatie.gelukt !== false;
    return `
      <div class="stap-label">Bedankt</div>
      <h1>Donatie<br>voltooid</h1>
      <hr class="divider">
      <div class="bon">
        <div class="bon-kop">${gelukt ? '✓ Ontvangstbewijs' : '✗ Ontvangstbewijs'}</div>
        <div class="bon-regel"><span class="bon-label">Bedrag</span><span class="bon-waarde">${c.symbool} ${donatie.bedrag}</span></div>
        <div class="bon-regel"><span class="bon-label">Bestemming</span><span class="bon-waarde">${bank ? bank.vlag + ' ' + escapeHtml(bank.naam) : '—'}</span></div>
        <div class="bon-regel"><span class="bon-label">Begunstigd team</span><span class="bon-waarde">${team ? escapeHtml(team.naam) : '—'}</span></div>
        <div class="bon-regel"><span class="bon-label">Effect op klassement</span><span class="bon-waarde ${gelukt ? (donatie.delta > 0 ? 'plus' : 'min') : 'min'}">${gelukt ? (donatie.delta > 0 ? '+1 punt' : '−1 punt') : 'geen — omkoping mislukt'}</span></div>
      </div>
      <div class="flavor" style="margin-top:18px;">
        ${gelukt
          ? 'Deze donatie was geheel legaal, volledig transparant en op geen enkele wijze bedoeld om de einduitslag te beïnvloeden. De Federatie dankt u voor uw vertrouwen.'
          : 'Helaas — dit team heeft in deze richting al het maximum aan "donaties" ontvangen. Uw bijdrage is niettemin genoteerd. De Federatie dankt u voor uw vertrouwen (en uw discretie).'}
      </div>
      <button class="btn-groen" id="nog-een-btn">Nog een donatie doen</button>
    `;
  }

  function koppelKlaar() {
    $('nog-een-btn').addEventListener('click', () => {
      donatie.bank = null; donatie.teamId = null; donatie.delta = null; donatie.gelukt = null;
      gaNaar('intro');
    });
  }

  function render() {
    const stappen = {
      intro:     { html: renderIntro,     koppel: koppelIntro },
      bedrag:    { html: renderBedrag,    koppel: koppelBedrag },
      betaling:  { html: renderBetaling,  koppel: koppelBetaling },
      verwerken: { html: renderVerwerken, koppel: null },
      bank:      { html: renderBank,      koppel: koppelBank },
      team:      { html: renderTeam,      koppel: koppelTeam },
      klaar:     { html: renderKlaar,     koppel: koppelKlaar }
    };
    const s = stappen[stap];
    $('inhoud').innerHTML = s.html();
    if (s.koppel) s.koppel();
  }

  /* ================= admin: portret wijzigen ================= */
  function verkleinFoto(bestand) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(bestand);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const MAAT = 320;
        const canvas = document.createElement('canvas');
        canvas.width = MAAT; canvas.height = MAAT;
        const ctx = canvas.getContext('2d');
        const kant = Math.min(img.width, img.height);
        const sx = (img.width - kant) / 2;
        const sy = (img.height - kant) / 2;
        ctx.drawImage(img, sx, sy, kant, kant, 0, 0, MAAT, MAAT);
        let data = canvas.toDataURL('image/webp', 0.85);
        if (!data.startsWith('data:image/webp')) data = canvas.toDataURL('image/jpeg', 0.85);
        resolve(data);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('ongeldig beeld')); };
      img.src = url;
    });
  }

  function zetFotoStatus(tekst, klasse) {
    const el = $('foto-status');
    if (!el) return;
    el.textContent = tekst;
    el.className = 'foto-status' + (klasse ? ' ' + klasse : '');
  }

  async function slaDoneerFotoOp(dataUrlOfNull) {
    const res = await fetch('/api/state', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const vers = await res.json();
    vers.doneerFoto = dataUrlOfNull;
    const put = await fetch('/api/state', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + sleutel, 'Content-Type': 'application/json' },
      body: JSON.stringify(vers)
    });
    if (!put.ok) throw new Error(put.status);
    hoofdstaat = vers;
  }

  function zetActiefStatus(tekst, klasse) {
    const el = $('actief-status');
    if (!el) return;
    el.textContent = tekst;
    el.className = 'foto-status' + (klasse ? ' ' + klasse : '');
  }

  async function zetDoneerActief(waarde) {
    const res = await fetch('/api/state', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const vers = await res.json();
    vers.doneerActief = waarde;
    const put = await fetch('/api/state', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + sleutel, 'Content-Type': 'application/json' },
      body: JSON.stringify(vers)
    });
    if (!put.ok) throw new Error(put.status);
    hoofdstaat = vers;
  }

  async function onFotoGekozen(e) {
    const bestand = e.target.files[0];
    if (!bestand) return;
    zetFotoStatus('● bezig…', 'bezig');
    try {
      const data = await verkleinFoto(bestand);
      await slaDoneerFotoOp(data);
      zetFotoStatus('✓ gelukt', 'ok');
      setTimeout(render, 600);
    } catch (err) {
      zetFotoStatus('✗ mislukt — probeer opnieuw', 'fout');
    }
  }

  /* ================= start ================= */
  $('admin-badge').addEventListener('click', () => {
    if (!confirm('Adminmodus verlaten? Je hebt de adminlink nodig om weer in te loggen.')) return;
    localStorage.removeItem(SLEUTEL_OPSLAG);
    location.reload();
  });

  (async () => {
    const kandidaat = localStorage.getItem(SLEUTEL_OPSLAG) || '';
    if (kandidaat) {
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Authorization': 'Bearer ' + kandidaat } });
        if (res.ok) { sleutel = kandidaat; adminmodus = true; }
        else localStorage.removeItem(SLEUTEL_OPSLAG);
      } catch {}
    }
    if (adminmodus) $('admin-badge').style.display = 'block';
    await laadStaat();
    render();
  })();
</script>
</body>
</html>
